name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Fail fast on a malformed tag or a missing changelog entry before anything builds.
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate release tag and changelog
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "release" ]; then
            echo "Manual dispatch: skipping tag validation; packages are versioned 0.0.0-manual and never published."
            exit 0
          fi
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag '${tag}' is not strict semver. Expected vMAJOR.MINOR.PATCH with an optional -prerelease suffix (for example v1.2.0 or v1.3.0-rc.1)."
            exit 1
          fi
          version="${tag#v}"
          if ! grep -qF "## [${version}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${version}]' section for release tag '${tag}'. Move the [Unreleased] notes to a [${version}] section before releasing."
            exit 1
          fi
          echo "Release tag '${tag}' is well-formed and CHANGELOG.md documents ${version}."

  # Gate publishing on the full live-API integration suite at the tagged commit.
  integration:
    needs: validate
    permissions:
      contents: read
    uses: ./.github/workflows/integration.yml
    secrets: inherit

  nuget:
    needs:
      - validate
      - integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: nuget

    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_DO_NOT_USE_MSBUILD_SERVER: 1

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore VulnersDotNet.slnx

      - name: Resolve package version from release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            version="${GITHUB_REF_NAME#v}"
            if [ -z "${version}" ]; then
              echo "Release tag '${GITHUB_REF_NAME}' did not yield a version." >&2
              exit 1
            fi
          else
            version="0.0.0-manual"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build VulnersDotNet.slnx --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: >
          dotnet test tests/VulnersDotNet.Tests/VulnersDotNet.Tests.csproj
          --configuration Release
          --no-build
          --filter "FullyQualifiedName~ValidationTests|FullyQualifiedName~SecurityTests"

      - name: Pack
        run: >
          dotnet pack src/VulnersDotNet/VulnersDotNet.csproj
          --configuration Release
          --no-build
          --output artifacts/packages
          -p:Version=${{ steps.version.outputs.version }}

      - name: Attest package provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vulnersdotnet-release-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error

      # Trusted Publishing: exchange the GitHub OIDC token for a short-lived nuget.org API key
      # (no long-lived NUGET_API_KEY secret). Requires id-token: write (set above) and a trusted
      # publishing policy on nuget.org for this repo + workflow + the `nuget` environment.
      - name: NuGet login (trusted publishing)
        id: nuget-login
        if: github.event_name == 'release'
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          # The nuget.org account username (profile name), not an email address. Kept in a secret
          # so it is masked in logs, per the NuGet Trusted Publishing guidance.
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        if: github.event_name == 'release'
        shell: bash
        run: |
          set -euo pipefail
          # No --skip-duplicate: re-publishing an existing version must fail loudly rather
          # than silently shipping nothing.
          # Push only *.nupkg: dotnet nuget push automatically uploads the adjacent *.snupkg
          # symbol package, so iterating *.snupkg separately re-pushes symbols and fails with
          # a 409 conflict while the first copy is still pending validation.
          for package in artifacts/packages/*.nupkg; do
            dotnet nuget push "${package}" \
              --api-key "${NUGET_API_KEY}" \
              --source https://api.nuget.org/v3/index.json
          done
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
