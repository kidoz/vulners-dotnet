name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_DO_NOT_USE_MSBUILD_SERVER: 1

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore VulnersDotNet.slnx

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Build
        run: dotnet build VulnersDotNet.slnx --configuration Release --no-restore

      # Live-API integration tests require VULNERS_API_KEY and run in integration.yml.
      # Here we run only the credential-free unit suites (input validation + credential hygiene).
      - name: Test
        run: >
          dotnet test tests/VulnersDotNet.Tests/VulnersDotNet.Tests.csproj
          --configuration Release
          --no-build
          --filter "FullyQualifiedName~ValidationTests|FullyQualifiedName~SecurityTests"
