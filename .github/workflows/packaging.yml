name: Packaging

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: packaging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packaging:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_DO_NOT_USE_MSBUILD_SERVER: 1

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore packages
        run: dotnet restore VulnersDotNet.slnx

      - name: Build
        run: dotnet build VulnersDotNet.slnx --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack src/VulnersDotNet/VulnersDotNet.csproj
          --configuration Release
          --no-build
          --output artifacts/packages

      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vulnersdotnet-packages
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          if-no-files-found: error
