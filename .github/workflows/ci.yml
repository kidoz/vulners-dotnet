name: publish-nuget

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "NuGet package version, for example 1.2.3"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Package version is required."
            exit 1
          fi

          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Restore
        run: dotnet restore VulnersDotNet.slnx

      - name: Build
        run: dotnet build VulnersDotNet.slnx -c Release --no-restore

      - name: Test
        run: dotnet test VulnersDotNet.slnx -c Release --no-build

      - name: Pack
        run: >
          dotnet pack src/VulnersDotNet/VulnersDotNet.csproj
          -c Release
          --no-build
          -p:ContinuousIntegrationBuild=true
          -p:PackageVersion=${{ steps.version.outputs.value }}
          -o ${{ github.workspace }}/artifacts

      - name: NuGet login
        id: login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push package to nuget.org
        run: >
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source "https://api.nuget.org/v3/index.json"
          --skip-duplicate
