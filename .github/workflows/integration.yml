name: Integration

on:
  pull_request:
  push:
    branches:
      - main
  # Reusable entry point so release.yml can gate publishing on the live-API suite.
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

# Scope the group by event so a release-triggered (workflow_call) run never shares a
# group with pull_request/push runs, and only those fast-feedback runs are cancellable.
concurrency:
  group: integration-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}

jobs:
  live-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DOTNET_NOLOGO: true
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_CLI_DO_NOT_USE_MSBUILD_SERVER: 1
      # Provided from repository/organization secrets. When absent, the IntegrationTestBase
      # skips the live tests (the run still succeeds); set the secret for real coverage.
      VULNERS_API_KEY: ${{ secrets.VULNERS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore packages
        run: dotnet restore VulnersDotNet.slnx

      - name: Build
        run: dotnet build VulnersDotNet.slnx --configuration Release --no-restore

      - name: Run integration tests
        run: >
          dotnet test tests/VulnersDotNet.Tests/VulnersDotNet.Tests.csproj
          --configuration Release
          --no-build
